name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Tests don't currently hit a DB. When integration tests land, a
      # postgres service container will be added here along with a
      # DATABASE_URL pointing at it (127.0.0.1:5432).
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    # Build verification placeholder. Not currently gating because Next
    # build requires secrets we haven't provisioned yet (see
    # Execution_Plan.md §P0). Flip `if: false` to `if: true` after P0
    # env provisioning.
    name: Build (non-blocking)
    runs-on: ubuntu-latest
    if: false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx prisma generate
      - run: npm run build
