name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Tests don't currently hit a DB. When integration tests land, a
      # postgres service container will be added here along with a
      # DATABASE_URL pointing at it (127.0.0.1:5432).
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Reject debug routes
        # No file should land under api/health|debug|dev. These are
        # historically the home for one-off diagnostic endpoints (the
        # 2026-04 /api/health/email leak was the prompt for this guard).
        # Webhook + business routes live elsewhere — this glob never
        # matches legitimate code.
        run: |
          set -e
          matches=$(find src/app/api -type d \( -name health -o -name debug -o -name dev \) 2>/dev/null || true)
          if [ -n "$matches" ]; then
            echo "::error::Debug route directory present:"
            echo "$matches"
            echo "Diagnostic endpoints are not allowed in committed code. Use a feature flag or remove."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Build doesn't connect to a DB but Prisma + a few server modules
      # read these envs at build time. Placeholders are safe — we never
      # ship the build artifact with these values; Railway injects real
      # values at runtime.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      SESSION_SECRET: ci-placeholder-session-secret-min-32-chars-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx prisma generate
      - run: npm run build
